version: "3.9"

x-common: &common
  restart: unless-stopped
  networks:
    - regime-net
  healthcheck:
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:
  # ── Base build stage (not a running service) ──────────────────────
  # All service images inherit from this via multi-stage builds.

  # ── Market Data Service ───────────────────────────────────────────
  market-data:
    <<: *common
    build:
      context: .
      dockerfile: docker/market-data/Dockerfile
    ports:
      - "7001:7001"
    environment:
      - SERVICE_NAME=market-data
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7001/health').raise_for_status()"]

  # ── Feature Engine Service ────────────────────────────────────────
  feature-engine:
    <<: *common
    build:
      context: .
      dockerfile: docker/feature-engine/Dockerfile
    ports:
      - "7002:7002"
    environment:
      - SERVICE_NAME=feature-engine
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7002/health').raise_for_status()"]

  # ── Detection Core Service ────────────────────────────────────────
  detection-core:
    <<: *common
    build:
      context: .
      dockerfile: docker/detection-core/Dockerfile
    ports:
      - "7003:7003"
    environment:
      - SERVICE_NAME=detection-core
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7003/health').raise_for_status()"]
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Backtesting Service ───────────────────────────────────────────
  backtesting:
    <<: *common
    build:
      context: .
      dockerfile: docker/backtesting/Dockerfile
    ports:
      - "7004:7004"
    environment:
      - SERVICE_NAME=backtesting
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7004/health').raise_for_status()"]

  # ── Visualization Service ─────────────────────────────────────────
  visualization:
    <<: *common
    build:
      context: .
      dockerfile: docker/visualization/Dockerfile
    ports:
      - "7005:7005"
    environment:
      - SERVICE_NAME=visualization
      - MPLBACKEND=Agg
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7005/health').raise_for_status()"]

  # ── API Gateway ───────────────────────────────────────────────────
  gateway:
    <<: *common
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    ports:
      - "7000:7000"
    environment:
      - SERVICE_NAME=gateway
      - LOG_LEVEL=info
      - MARKET_DATA_URL=http://market-data:7001
      - FEATURE_ENGINE_URL=http://feature-engine:7002
      - DETECTION_CORE_URL=http://detection-core:7003
      - BACKTESTING_URL=http://backtesting:7004
      - VISUALIZATION_URL=http://visualization:7005
    depends_on:
      market-data:
        condition: service_healthy
      feature-engine:
        condition: service_healthy
      detection-core:
        condition: service_healthy
      backtesting:
        condition: service_healthy
      visualization:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7000/health').raise_for_status()"]

networks:
  regime-net:
    driver: bridge
