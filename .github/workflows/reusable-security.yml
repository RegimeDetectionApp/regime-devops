name: Reusable Security Scan

on:
  # Called by other workflows
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'
      source-dirs:
        description: 'Source directories to scan (space-separated)'
        required: false
        type: string
        default: 'src'
      requirements-file:
        description: 'Requirements file for dependency scanning'
        required: false
        type: string
        default: 'requirements.txt'
      bandit-config:
        description: 'Path to bandit config'
        required: false
        type: string
        default: 'pyproject.toml'

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'
        default: '3.11'
      source-dirs:
        description: 'Source directories to scan (space-separated)'
        required: false
        type: string
        default: 'src'
      requirements-file:
        description: 'Requirements file for dependency scanning'
        required: false
        type: string
        default: 'requirements.txt'
      bandit-config:
        description: 'Path to bandit config'
        required: false
        type: string
        default: 'pyproject.toml'

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('**/requirements*.txt') }}

      - name: 🔧 Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety

      - name: 🔒 Run bandit (security linting)
        run: |
          echo "::group::Bandit security scan"
          if [ -f "${{ inputs.bandit-config }}" ]; then
            bandit -r ${{ inputs.source-dirs }} -c ${{ inputs.bandit-config }} -f json -o bandit-report.json || true
          else
            bandit -r ${{ inputs.source-dirs }} -f json -o bandit-report.json || true
          fi

          # Show summary
          if [ -f bandit-report.json ]; then
            python -c "
import json
with open('bandit-report.json') as f:
    data = json.load(f)
    metrics = data.get('metrics', {})
    total = sum(m.get('CONFIDENCE.HIGH', 0) for m in metrics.values())
    print(f'🔒 Bandit found {total} high-confidence issues')
" || echo "Report generated"
          fi
          echo "::endgroup::"

      - name: 📊 Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      - name: 🛡️ Check dependencies for vulnerabilities
        run: |
          echo "::group::Safety dependency scan"
          if [ -f "${{ inputs.requirements-file }}" ]; then
            pip install -r ${{ inputs.requirements-file }} 2>/dev/null || true
            safety check --json --output safety-report.json || true

            # Show summary
            if [ -f safety-report.json ]; then
              python -c "
import json
try:
    with open('safety-report.json') as f:
        data = json.load(f)
        vulns = data.get('vulnerabilities', [])
        print(f'🛡️ Safety found {len(vulns)} vulnerabilities')
except:
    print('Safety scan completed')
" || echo "Report generated"
            fi
          else
            echo "No requirements file found, skipping dependency scan"
          fi
          echo "::endgroup::"

      - name: 📦 Upload safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-security-report
          path: safety-report.json
          retention-days: 30

      - name: ✅ Security scan completed
        run: |
          echo "## Security Scan Results 🔒" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Security scans completed!" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Bandit (code security)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Safety (dependency vulnerabilities)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Reports uploaded as artifacts" >> $GITHUB_STEP_SUMMARY
