name: Reusable Python Tests

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'
      test-suite:
        description: 'Test suite to run (all, unit, integration)'
        required: false
        type: string
        default: 'all'
      source-dirs:
        description: 'Source directories to test (space-separated)'
        required: false
        type: string
        default: 'src tests'
      requirements-file:
        description: 'Requirements file path'
        required: false
        type: string
        default: 'requirements.txt'
      verbose:
        description: 'Verbose test output'
        required: false
        type: boolean
        default: false
    outputs:
      test-result:
        description: 'Test execution result'
        value: ${{ jobs.test.outputs.result }}
      coverage:
        description: 'Coverage percentage'
        value: ${{ jobs.test.outputs.coverage }}

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.pytest.outcome }}
      coverage: ${{ steps.coverage.outputs.percentage }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ inputs.python-version }}-
            ${{ runner.os }}-pip-

      - name: 🔧 Install dependencies
        run: |
          python -m pip install --upgrade pip

          # Try to install from requirements file
          if [ -f "${{ inputs.requirements-file }}" ]; then
            echo "Installing from ${{ inputs.requirements-file }}"
            pip install -r ${{ inputs.requirements-file }}
          fi

          # Try to install as editable package
          if [ -f "pyproject.toml" ]; then
            echo "Installing package in editable mode"
            pip install -e ".[dev]" 2>/dev/null || echo "Failed to install with [dev] extras"
          fi

          # Install test dependencies
          pip install pytest pytest-cov pytest-asyncio pytest-mock

      - name: 🧪 Run tests
        id: pytest
        run: |
          echo "::group::Running ${{ inputs.test-suite }} tests"

          PYTEST_ARGS="-v --tb=short --cov=${{ inputs.source-dirs }} --cov-report=xml --cov-report=term-missing"

          if [ "${{ inputs.verbose }}" == "true" ]; then
            PYTEST_ARGS="-vv --tb=long --cov=${{ inputs.source-dirs }} --cov-report=xml --cov-report=term-missing"
          fi

          if [ "${{ inputs.test-suite }}" == "unit" ]; then
            pytest tests/ $PYTEST_ARGS -m "not integration"
          elif [ "${{ inputs.test-suite }}" == "integration" ]; then
            pytest tests/ $PYTEST_ARGS -m "integration"
          else
            pytest tests/ $PYTEST_ARGS
          fi

          echo "::endgroup::"

      - name: 📊 Extract coverage percentage
        id: coverage
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); print(tree.getroot().attrib['line-rate'])" 2>/dev/null || echo "0")
            COVERAGE_PCT=$(python -c "print(f'{float($COVERAGE) * 100:.2f}')" 2>/dev/null || echo "0")
            echo "percentage=$COVERAGE_PCT" >> $GITHUB_OUTPUT
            echo "Coverage: $COVERAGE_PCT%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
          fi

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: ${{ inputs.test-suite }}
          name: codecov-${{ inputs.python-version }}
          fail_ci_if_error: false

      - name: 📦 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ inputs.python-version }}-${{ inputs.test-suite }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: ✅ Tests completed
        if: success()
        run: echo "All tests passed with coverage at ${{ steps.coverage.outputs.percentage }}%"
