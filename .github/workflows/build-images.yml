name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "docker-compose.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - gateway
          - market-data
          - feature-engine
          - detection-core
          - backtesting
          - visualization

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/regimedetectionapp

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/base/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/regime-base:latest
            ${{ env.IMAGE_PREFIX }}/regime-base:${{ github.sha }}

  build-services:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - gateway
          - market-data
          - feature-engine
          - detection-core
          - backtesting
          - visualization
    steps:
      - uses: actions/checkout@v4

      - name: Check if service should be built
        id: check
        run: |
          if [ "${{ github.event.inputs.service }}" = "" ] || \
             [ "${{ github.event.inputs.service }}" = "all" ] || \
             [ "${{ github.event.inputs.service }}" = "${{ matrix.service }}" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone platform code (for service app files)
        if: steps.check.outputs.build == 'true'
        run: |
          git clone --depth 1 https://github.com/RegimeDetectionApp/regime-platform.git /tmp/platform
          cp -r /tmp/platform/gateway ./gateway
          cp -r /tmp/platform/services ./services
          cp /tmp/platform/run.py ./run.py

      - name: Build and push ${{ matrix.service }}
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/regime-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/regime-${{ matrix.service }}:${{ github.sha }}
