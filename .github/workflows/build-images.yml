name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "docker-compose.yml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: regimedetectionapp

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: base, dockerfile: docker/base/Dockerfile }
          - { name: market-data, dockerfile: docker/market-data/Dockerfile }
          - { name: feature-engine, dockerfile: docker/feature-engine/Dockerfile }
          - { name: detection-core, dockerfile: docker/detection-core/Dockerfile }
          - { name: backtesting, dockerfile: docker/backtesting/Dockerfile }
          - { name: visualization, dockerfile: docker/visualization/Dockerfile }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image first (if not base)
        if: matrix.service.name != 'base'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile
          push: false
          load: true
          tags: regime-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/regime-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/regime-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
