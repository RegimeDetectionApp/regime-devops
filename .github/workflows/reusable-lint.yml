name: Reusable Linting

on:
  # Called by other workflows
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.11'
      source-dirs:
        description: 'Source directories to lint (space-separated)'
        required: false
        type: string
        default: 'src tests'
      ruff-config:
        description: 'Path to ruff config file'
        required: false
        type: string
        default: 'pyproject.toml'
      run-mypy:
        description: 'Run mypy type checking'
        required: false
        type: boolean
        default: true

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'
        default: '3.11'
      source-dirs:
        description: 'Source directories to lint (space-separated)'
        required: false
        type: string
        default: 'src tests'
      ruff-config:
        description: 'Path to ruff config file'
        required: false
        type: string
        default: 'pyproject.toml'
      run-mypy:
        description: 'Run mypy type checking'
        required: false
        type: boolean
        default: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/pyproject.toml') }}

      - name: 🔧 Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy

      - name: 🔍 Run ruff (linting)
        run: |
          echo "::group::Ruff linting"
          if [ -f "${{ inputs.ruff-config }}" ]; then
            ruff check ${{ inputs.source-dirs }} --config ${{ inputs.ruff-config }} --output-format=github
          else
            ruff check ${{ inputs.source-dirs }} --output-format=github
          fi
          echo "::endgroup::"

      - name: 🎨 Run black (format check)
        run: |
          echo "::group::Black format check"
          black --check --diff ${{ inputs.source-dirs }}
          echo "::endgroup::"

      - name: 🔎 Run mypy (type checking)
        if: inputs.run-mypy
        run: |
          echo "::group::Type checking with mypy"
          # Extract only the first directory for mypy (it's usually src or the main package)
          FIRST_DIR=$(echo "${{ inputs.source-dirs }}" | awk '{print $1}')
          mypy $FIRST_DIR --install-types --non-interactive || echo "⚠️ Type checking found issues (non-blocking)"
          echo "::endgroup::"

      - name: ✅ Linting passed
        run: |
          echo "## Lint Results ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All linting checks passed!" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Ruff (linting)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Black (formatting)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.run-mypy }}" == "true" ]; then
            echo "- ✅ MyPy (type checking)" >> $GITHUB_STEP_SUMMARY
          fi
