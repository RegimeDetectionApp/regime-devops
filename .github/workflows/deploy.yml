name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - local
          - production

env:
  NAMESPACE: regime

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone infra repo
        run: |
          git clone --depth 1 https://github.com/RegimeDetectionApp/regime-infra.git /tmp/infra

      - name: Configure kubectl
        if: inputs.environment == 'production'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig (production)
        if: inputs.environment == 'production'
        run: aws eks update-kubeconfig --name regime-cluster --region ${{ secrets.AWS_REGION }}

      - name: Deploy to ${{ inputs.environment }}
        run: |
          cd /tmp/infra/k8s
          if [ "${{ inputs.environment }}" = "local" ]; then
            kubectl apply -k overlays/local
          else
            kubectl apply -k overlays/production
          fi

      - name: Wait for rollout
        run: |
          SERVICES="market-data feature-engine detection-core backtesting visualization gateway"
          for svc in $SERVICES; do
            echo "Waiting for $svc..."
            kubectl rollout status deployment/regime-$svc -n ${{ env.NAMESPACE }} --timeout=120s
          done
          echo "All services deployed successfully"

      - name: Health check
        run: |
          echo "Running post-deploy health checks..."
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          kubectl get svc -n ${{ env.NAMESPACE }}
